# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec:version-catalog-declaration
[versions]
commons-math3 = "3.6.1"
guava = "33.5.0-jre"
junit-jupiter = "6.0.1"
version-catalog-update = "1.1.0"

[libraries]
commons-math3 = { module = "org.apache.commons:commons-math3", version.ref = "commons-math3" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }

[plugins]
version-catalog-update = { id = "nl.littlerobots.version-catalog-update", version.ref = "version-catalog-update" }
